      - generic [ref=e344]:
        - generic [ref=e345]:
          - generic [ref=e346]: "1"
          - heading "Get Early Access" [level=3] [ref=e347]
          - paragraph [ref=e348]: Invites are sent in order, and the earliest users get first pick of the most valuable .zcash names before others can claim them. Free to join. No commitment.
        - img [ref=e350]
        - generic [ref=e352]:
          - generic [ref=e353]: "2"
          - heading "Move Up + Earn ZEC" [level=3] [ref=e354]
          - paragraph [ref=e355]: Every referral pushes you closer to the front of the line, giving you a better chance at high-demand names. Plus, earn ZEC when your referrals claim a name.
        - img [ref=e357]
        - generic [ref=e359]:
          - generic [ref=e360]: "3"
          - heading "Claim Your Name" [level=3] [ref=e361]
          - paragraph [ref=e362]: You’ll receive an email when it’s your turn. Log in, choose your .zcash name, and secure it before the public launch. Keep it, use it to transact, or sell it as demand grows.
      - generic [ref=e363]:
        - heading "What You Can Do with a .zcash Name" [level=3] [ref=e364]
        - generic [ref=e365]:
          - paragraph [ref=e366]:
            - strong [ref=e367]: Send and Receive Without Long Addresses
            - text: — Use a name people can read and remember instead of copying and pasting wallet strings.
          - paragraph [ref=e368]:
            - strong [ref=e369]: Use One Name Across Zcash Apps
            - text: — Sign in with your .zcash name across supported apps and prove ownership of your address without extra accounts.
          - paragraph [ref=e370]:
            - strong [ref=e371]: Verify Who You’re Dealing With
            - text: — Connect your .zcash name to a
            - link "Zcash.me" [ref=e372] [cursor=pointer]:
              - /url: https://zcash.me
