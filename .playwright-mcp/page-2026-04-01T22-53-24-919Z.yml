    - generic [ref=e375]:
      - paragraph [ref=e378]: Frequently Asked Questions
      - generic [ref=e380]:
        - generic [ref=e381]:
          - button "What is a .zcash name? +" [ref=e382] [cursor=pointer]:
            - generic [ref=e383]: What is a .zcash name?
            - generic [ref=e384]: +
          - paragraph [ref=e385]: .zcash is a human-readable name that maps to a Zcash address and profile links. Instead of sharing a long cryptographic address, you share something like yourname.zcash.
        - generic [ref=e386]:
          - button "What can I do with my .zcash name? +" [ref=e387] [cursor=pointer]:
            - generic [ref=e388]: What can I do with my .zcash name?
            - generic [ref=e389]: +
          - paragraph [ref=e390]:
            - text: Your .zcash name replaces long wallet addresses with a simple, human-readable name for sending and receiving payments. Each name can be linked to a
            - link "Zcash.me" [ref=e391] [cursor=pointer]:
              - /url: https://zcash.me
            - text: profile so others can verify who they’re transacting with. You can claim a name to use it, hold it as a digital asset, or sell it later as demand grows.
        - generic [ref=e392]:
          - button "Do I really own my name? +" [ref=e393] [cursor=pointer]:
            - generic [ref=e394]: Do I really own my name?
            - generic [ref=e395]: +
          - paragraph [ref=e396]: Yes. Your name is registered on an on-chain registry linked to your address. There are no renewal fees — stay active once every 180 days to maintain it. You can sell, transfer, or buy additional names at any time.
        - generic [ref=e397]:
          - button "How do payments stay private? +" [ref=e398] [cursor=pointer]:
            - generic [ref=e399]: How do payments stay private?
            - generic [ref=e400]: +
          - paragraph [ref=e401]: Payments made using Zcash shielded transactions do not publicly expose amounts and balances on the public ledger.
        - generic [ref=e402]:
          - button "Can people pay me with other cryptocurrencies? +" [ref=e403] [cursor=pointer]:
            - generic [ref=e404]: Can people pay me with other cryptocurrencies?
            - generic [ref=e405]: +
          - paragraph [ref=e406]: Yes. Cross-pay flows let senders use popular assets while settlement can still arrive in Zcash to the address associated with your ZcashName.
        - generic [ref=e407]:
          - button "How does Log in with Zcash work? +" [ref=e408] [cursor=pointer]:
            - generic [ref=e409]: How does Log in with Zcash work?
            - generic [ref=e410]: +
          - paragraph [ref=e411]: Your .zcash name resolves to an address. That address receives a one-time passcode. Replying with the one-time passcode proves you own that address. No passwords or third-party accounts are required — just your name.
        - generic [ref=e412]:
          - button "What is testnet mode? +" [ref=e413] [cursor=pointer]:
            - generic [ref=e414]: What is testnet mode?
            - generic [ref=e415]: +
          - paragraph [ref=e416]: Testnet mode lets you explore ZcashNames without using real ZEC. All transactions on testnet use TAZ (testnet ZEC), which has no monetary value. It's a safe way to try registering names, updating addresses, and listing names for sale before going live on mainnet.
        - generic [ref=e417]:
          - button "How do waitlist referrals work? +" [ref=e418] [cursor=pointer]:
            - generic [ref=e419]: How do waitlist referrals work?
            - generic [ref=e420]: +
          - paragraph [ref=e421]: When you join the waitlist you receive a unique referral link. Sharing it moves you up the queue — the more people you refer, the earlier you get access when ZcashNames launches. Plus, if they purchase a name after our launch, you earn 0.05 ZEC per name.
        - generic [ref=e422]:
          - button "How do I become an ambassador? +" [ref=e423] [cursor=pointer]:
            - generic [ref=e424]: How do I become an ambassador?
            - generic [ref=e425]: +
          - paragraph [ref=e426]:
            - text: The Ambassador Program is for people who want to grow adoption in their region, host community events, and help onboard new users. Fill out the interest form
            - link "here" [ref=e427] [cursor=pointer]:
              - /url: https://form.typeform.com/to/oBd1YeoI
            - text: to get started.
        - generic [ref=e428]:
